name: Create Config & Store in Key Vault

on:
  workflow_dispatch:
    inputs:
      server_name:
        description: 'Server/Config name'
        required: true
        type: string
      server_ip:
        description: 'Server IP address'
        required: true
        type: string
      network:
        description: 'Network/Subnet'
        required: true
        type: choice
        options:
          - production-network
          - staging-network
          - dev-network
          - dmz-network
      environment:
        description: 'Environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

jobs:
  create-and-store:
    runs-on: ubuntu-latest
    outputs:
      secret_name: ${{ steps.naming.outputs.secret_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      # ✅ STEP 1: Generate safe secret name automatically
      - name: Generate secret name
        id: naming
        run: |
          RAW_NAME="config-${{ github.event.inputs.server_name }}-${{ github.event.inputs.environment }}"
          
          # normalize (lowercase + replace invalid chars)
          SAFE_NAME=$(echo "$RAW_NAME" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9-' '-')
          
          echo "secret_name=$SAFE_NAME" >> $GITHUB_OUTPUT
          echo "Using secret name: $SAFE_NAME"

      # ✅ STEP 2: Create JSON safely
      - name: Create config file
        run: |
          jq -n \
            --arg name "${{ github.event.inputs.server_name }}" \
            --arg ip "${{ github.event.inputs.server_ip }}" \
            --arg net "${{ github.event.inputs.network }}" \
            --arg env "${{ github.event.inputs.environment }}" \
            --arg actor "${{ github.actor }}" \
            --arg repo "${{ github.repository }}" \
            --arg run "${{ github.run_id }}" \
            --arg time "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            '{
              server_name: $name,
              server_ip: $ip,
              network: $net,
              environment: $env,
              created_by: $actor,
              repository: $repo,
              workflow_run: $run,
              created_at: $time
            }' > config.json

          cat config.json

      - name: Preview
        run: |
          echo "### Config Preview" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
          cat config.json >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "**Secret Name**: ${{ steps.naming.outputs.secret_name }}" >> $GITHUB_STEP_SUMMARY

      # ✅ STEP 3: Store safely in Key Vault
      - name: Store in Key Vault
        run: |
          VAULT_NAME="${{ secrets.AZURE_VAULT_NAME }}"
          SECRET_NAME="${{ steps.naming.outputs.secret_name }}"

          echo "Storing secret: $SECRET_NAME"

          az keyvault secret set \
            --vault-name "$VAULT_NAME" \
            --name "$SECRET_NAME" \
            --file config.json

          echo "✓ Stored successfully"

  # ✅ SECOND JOB uses SAME generated name
  use-config-in-terraform:
    runs-on: ubuntu-latest
    needs: create-and-store

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Retrieve config
        run: |
          VAULT_NAME="${{ secrets.AZURE_VAULT_NAME }}"
          SECRET_NAME="${{ needs.create-and-store.outputs.secret_name }}"

          CONFIG=$(az keyvault secret show \
            --vault-name "$VAULT_NAME" \
            --name "$SECRET_NAME" \
            --query value -o tsv)

          echo "::add-mask::$CONFIG"
          echo "CONFIG=$CONFIG" >> $GITHUB_ENV

      - name: Terraform Plan
        run: |
          terraform init
          terraform plan \
            -var="server_config=$CONFIG"
        working-directory: ./terraform
